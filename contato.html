<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfólio Trabalho Uninter</title>   
    <link rel="stylesheet" href="style3.css">
</head>



<body>

    <!--Cabeçalho-->
    <header class="gridHeader">
        
        <div class="logo">
            <h1>Kaique Andrade</h1>
        </div>
        <nav class="menu">
            <ul>
                <li ><a href="index.html">Sobre mim</a></li>
                <li><a href="formacao.html">Formação</a></li>
                <li><a href="portfolio.html">Portfólio</a></li>
                <li><a href="contato.html" class="paginaAtual">Contato</a></li>
            </ul>
        </nav>
    </header>

    <!--Formulário-->

    <section class="formularioContato">
        <h1>Envie uma mensagem</h1>

        <form id="formularioContato" novalidate>

            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" placeholder="Seu nome completo" required>

            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" placeholder="email@exemplo.com" required>

            <label for="mensagem">Mensagem:</label>
            <textarea id="mensagem" name="mensagem" rows="6" placeholder="Digite a sua mensagem aqui" required></textarea>

            <button type="submit">Enviar sua mensagem</button>
        </form>

        <div id="mensagemSucesso" class="sucessoForm oculto">
            <p>Mensagem foi enviada!</p>
        </div>
        
        <!--Link do script-->
        <script src="script.js"></script>

    </section>

</body>
